

<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Escape The Simulation</title>


<style>

* {

    margin: 0;

    padding: 0;

    box-sizing: border-box;

    font-family: Arial, sans-serif;

}


body {

    height: 100vh;

    overflow-x: hidden;

    color: white;

}


/* BACKGROUND VIDEO */

video.bg {

    position: fixed;

    top: 50%;

    left: 50%;

    min-width: 100%;

    min-height: 100%;

    transform: translate(-50%, -50%);

    object-fit: cover;

    z-index: -2;

    filter: blur(10px) brightness(0.35);

}


/* DARK OVERLAY */

.overlay {

    position: fixed;

    inset: 0;

    background: rgba(0,0,0,0.55);

    z-index: -1;

}


/* CENTER CARD */

.container {

    min-height: 100vh;

    display: flex;

    justify-content: center;

    align-items: center;

    padding: 20px;

}


.card {

    width: 100%;

    max-width: 420px;

    text-align: center;

    backdrop-filter: blur(12px);

    background: rgba(0,0,0,0.35);

    border-radius: 18px;

    padding: 25px;

    box-shadow: 0 10px 40px rgba(0,0,0,0.5);

}


/* TITLE */

h1 {

    font-size: 26px;

    margin-bottom: 6px;

}


h2 {

    font-size: 14px;

    font-weight: normal;

    color: #ccc;

    margin-bottom: 20px;

}


/* SPOTIFY */

.spotify {

    margin-bottom: 20px;

}


.spotify iframe {

    width: 100%;

    height: 152px;

    border-radius: 12px;

}


/* LINKS */

.links {

    display: flex;

    justify-content: center;

    gap: 18px;

    margin-top: 15px;

}


.links a {

    width: 48px;

    height: 48px;

    transition: transform 0.2s ease;

}


.links a:hover {

    transform: scale(1.15);

}


.links img {

    width: 100%;

}


/* MOBILE TWEAKS */

@media (max-width: 480px) {

    .card {

        max-width: 95%;

        padding: 20px;

    }


    h1 {

        font-size: 22px;

    }

}

</style>

</head>


<body>


<!-- BACKGROUND VIDEO -->

<video class="bg" autoplay muted loop playsinline>

    <source src="canvas.mp4" type="video/mp4">

</video>


<div class="overlay"></div>


<div class="container">

    <div class="card">


        <h1>Escape The Simulation</h1>

        <h2>Adrian Rooz Feat. Alina Luminelli</h2>


        <!-- SPOTIFY -->

        <div class="spotify">

            <iframe 

                src="https://open.spotify.com/embed/album/5XLNc36hHHszh1fliuSigS"

                frameborder="0"

                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">

            </iframe>

        </div>


        <!-- ICON LINKS -->

        <div class="links">

            <a href="https://open.spotify.com/album/5XLNc36hHHszh1fliuSigS?si=81GudMn4She8UW8jKDyiqQ" target="_blank">

                <img src="https://cdn-icons-png.flaticon.com/512/174/174872.png">

            </a>


            <a href="https://music.apple.com/us/song/escape-the-simulation-feat-alina-luminelli/6765772935" target="_blank">

                <img src="https://cdn-icons-png.flaticon.com/512/731/731985.png">

            </a>


            <a href="https://youtu.be/W4MJTtdNICU?si=irJtBAvY9K3nal22" target="_blank">

                <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">

            </a>

        </div>


    </div>

</div>


</body>

</html>
